apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-nginx-a-ingress
  namespace: demo-a
spec:
  podSelector:
    matchLabels:
      app: nginx-a
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: demo-a
      ports:
        - protocol: TCP
          port: 80
