apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab1-express-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lab1-express
  template:
    metadata:
      labels:
        app: lab1-express
    spec:
      containers:
        - name: express
          image: lab1-express:1.0
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
