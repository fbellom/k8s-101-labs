apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab1-express
  namespace: demo-a
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lab1-express
  template:
    metadata:
      labels:
        app: lab1-express
    spec:
      containers:
        - name: express
          image: lab1-express:1.0
          imagePullPolicy: Never
          ports:
            - containerPort: 3000

---
apiVersion: v1
kind: Service
metadata:
  name: lab1-express-svc
  namespace: demo-a
spec:
  selector:
    app: lab1-express
  ports:
    - port: 3000
      targetPort: 3000
